name: hyperlocal
description: "Records real time weather data"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  syncfusion_flutter_gauges: ^25.1.35
  intl: ^0.18.0
  http: ^1.2.0
  geolocator: ^12.0.0
  weather_icons: ^3.0.0
  font_awesome_flutter: ^10.7.0
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/icon.png"
  web:
    generate: true
    image_path: "lib/assets/icon.png"
    background_color: "#161427"
    theme_color: "#161427"
  windows:
    generate: true
    image_path: "lib/assets/icon.png"
  macos:
    generate: true
    image_path: "lib/assets/icon.png"

flutter:
  uses-material-design: true